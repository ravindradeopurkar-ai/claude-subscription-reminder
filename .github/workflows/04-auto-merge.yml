# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4 · Auto-Merge
# ─────────────────────────────────────────────────────────────────────────────
# Trigger: pull_request labeled  →  only when label == "review-approved"
# Action : squash-merges the PR into master
#
# Required secret: PAT
#   (GITHUB_TOKEN merges work, but PAT is consistent with the rest of the pipeline)
# ─────────────────────────────────────────────────────────────────────────────
name: "4 · Auto-Merge"

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Only run when the exact "review-approved" label is added
    if: ${{ github.event.label.name == 'review-approved' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Merge the PR ──────────────────────────────────────────────────────
      - name: Merge approved PR
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          TITLE="${{ github.event.pull_request.title }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"

          echo "Merging PR #$PR: $TITLE (from branch: $BRANCH)"

          gh pr merge "$PR" \
            --squash \
            --subject "🤖 $TITLE" \
            --body "Auto-merged after Claude AI review approval ✅

Pipeline stages completed:
1. ✅ requirement.md pushed to branch \`$BRANCH\`
2. ✅ plan.md auto-generated by Claude (Stage 1)
3. ✅ PR created automatically (Stage 2)
4. ✅ Plan reviewed and approved by Claude AI (Stage 3)
5. ✅ PR merged automatically (Stage 4)"

          echo "✅ PR #$PR merged into master successfully!"
          echo "Branch $BRANCH can now be deleted."
