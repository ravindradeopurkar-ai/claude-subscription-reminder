# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 · Create Pull Request
# ─────────────────────────────────────────────────────────────────────────────
# Trigger: workflow_run — fires when Stage 1 completes successfully
# Action : creates a PR from the feature branch → master
#
# Required secret: PAT  (GitHub Personal Access Token with repo scope)
#   WHY PAT instead of GITHUB_TOKEN?
#   PRs created with GITHUB_TOKEN do NOT trigger pull_request events,
#   so Stage 3 would never fire. A PAT bypasses this restriction.
#
#   Create one at: Settings → Developer settings → Personal access tokens
#   Required scopes: repo (Full control of private repositories)
#   Add it as a repo secret named: PAT
# ─────────────────────────────────────────────────────────────────────────────
name: "2 · Create PR"

on:
  workflow_run:
    workflows: ["1 · Generate Plan"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    # Only run if Stage 1 succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch at latest commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      # ── Create PR ─────────────────────────────────────────────────────────
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          # Skip default branches
          if [ "$BRANCH" = "master" ] || [ "$BRANCH" = "main" ]; then
            echo "Skipping PR creation for default branch"
            exit 0
          fi

          # Skip if a PR already exists for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for branch $BRANCH — skipping"
            exit 0
          fi

          # Extract plan title from the first H1 heading in plan.md
          PLAN_TITLE=$(grep -m1 '^# ' plan.md | sed 's/^# //' || echo "Implementation Plan")
          REQUIREMENT=$(cat requirement.md)

          gh pr create \
            --title "📋 ${PLAN_TITLE}" \
            --body "## 📄 Original Requirement

${REQUIREMENT}

---

## 📐 Implementation Plan

See [plan.md](plan.md) on this branch for the full implementation plan.

---
> 🤖 Auto-generated by the CI pipeline (Stage 2 · Create PR)" \
            --base master \
            --head "$BRANCH"

          echo "✅ PR created for branch: $BRANCH"
